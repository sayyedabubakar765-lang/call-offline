<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Pro Dialer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            overflow: hidden;
        }
        .keypad-btn {
            background: #1c1c1e;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .keypad-btn:active {
            background: #3a3a3c;
        }
        .key-num {
            font-size: 32px;
            line-height: 1;
        }
        .key-abc {
            font-size: 10px;
            color: #8e8e93;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .call-trigger {
            background: #34c759;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .call-trigger:active {
            background: #2db04d;
        }
        #display {
            font-size: 40px;
            min-height: 60px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }
        .delete-btn {
            color: #8e8e93;
            font-size: 20px;
            cursor: pointer;
            width: 50px;
            text-align: center;
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- Top Display Area -->
    <div class="flex-1 flex flex-col justify-end items-center mb-8">
        <div id="display" class="font-light"></div>
        <div id="sub-display" class="text-blue-500 text-sm h-5">Add Number</div>
    </div>

    <!-- Keypad Grid -->
    <div class="grid grid-cols-3 gap-y-5 gap-x-8 justify-items-center mb-10">
        <div class="keypad-btn" onclick="addNum('1')"><span class="key-num">1</span><span class="key-abc">&nbsp;</span></div>
        <div class="keypad-btn" onclick="addNum('2')"><span class="key-num">2</span><span class="key-abc">ABC</span></div>
        <div class="keypad-btn" onclick="addNum('3')"><span class="key-num">3</span><span class="key-abc">DEF</span></div>
        
        <div class="keypad-btn" onclick="addNum('4')"><span class="key-num">4</span><span class="key-abc">GHI</span></div>
        <div class="keypad-btn" onclick="addNum('5')"><span class="key-num">5</span><span class="key-abc">JKL</span></div>
        <div class="keypad-btn" onclick="addNum('6')"><span class="key-num">6</span><span class="key-abc">MNO</span></div>
        
        <div class="keypad-btn" onclick="addNum('7')"><span class="key-num">7</span><span class="key-abc">PQRS</span></div>
        <div class="keypad-btn" onclick="addNum('8')"><span class="key-num">8</span><span class="key-abc">TUV</span></div>
        <div class="keypad-btn" onclick="addNum('9')"><span class="key-num">9</span><span class="key-abc">WXYZ</span></div>
        
        <div class="keypad-btn" onclick="addNum('*')"><span class="key-num" style="margin-top: 10px;">*</span><span class="key-abc">&nbsp;</span></div>
        <div class="keypad-btn" onclick="addNum('0')"><span class="key-num">0</span><span class="key-abc">+</span></div>
        <div class="keypad-btn" onclick="addNum('#')"><span class="key-num">#</span><span class="key-abc">&nbsp;</span></div>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center justify-center space-x-20 mb-10 relative">
        <div class="w-12 h-12"></div> <!-- Spacer for symmetry -->
        
        <div class="call-trigger" onclick="makeCall()">
            <svg viewBox="0 0 24 24" width="38" height="38" fill="white"><path d="M6.62 10.79c1.44 2.82 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </div>

        <div class="delete-btn active:text-white" onclick="backspace()">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
        </div>
    </div>

    <!-- Footer Tabs -->
    <div class="flex justify-around text-xs text-gray-500 pb-2 border-t border-gray-800 pt-4">
        <div class="flex flex-col items-center"><span class="text-xl mb-1">⭐</span>Favorites</div>
        <div class="flex flex-col items-center"><span class="text-xl mb-1">🕒</span>Recents</div>
        <div class="flex flex-col items-center"><span class="text-xl mb-1 text-blue-500">👤</span>Contacts</div>
        <div class="flex flex-col items-center text-blue-500"><span class="text-xl mb-1">🔘</span>Keypad</div>
        <div class="flex flex-col items-center"><span class="text-xl mb-1">📟</span>Voicemail</div>
    </div>

    <script>
        let currentNumber = "";
        const display = document.getElementById('display');
        const subDisplay = document.getElementById('sub-display');

        function addNum(n) {
            if (currentNumber.length < 15) {
                currentNumber += n;
                updateDisplay();
                // Play a subtle click sound (optional)
                if (window.navigator.vibrate) window.navigator.vibrate(20);
            }
        }

        function backspace() {
            currentNumber = currentNumber.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            display.innerText = currentNumber;
            if (currentNumber.length > 0) {
                subDisplay.innerText = "Add Number";
            } else {
                subDisplay.innerText = "";
            }
        }

        function makeCall() {
            if (currentNumber.length > 0) {
                // Real Action: Ye device ke system dialer ko call bhejta hai
                // Jab aap iska APK banaoge, ye bina kisi error ke kaam karega
                window.location.href = "tel:" + currentNumber;
            }
        }

        // Handle long press on 0 for +
        let zeroTimer;
        const zeroBtn = document.querySelector('.keypad-btn:nth-child(11)');
        
        zeroBtn.addEventListener('touchstart', () => {
            zeroTimer = setTimeout(() => {
                currentNumber = currentNumber.slice(0, -1) + "+";
                updateDisplay();
            }, 800);
        });
        zeroBtn.addEventListener('touchend', () => clearTimeout(zeroTimer));
    </script>
</body>
</html>
